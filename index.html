<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻將網頁版</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🀄 麻將網頁版</h1>
            <div class="header-controls">
                <button id="btn-settings">設定</button>
                <button id="btn-new-game">新局</button>
            </div>
        </header>
        
        <main id="game-board">
            <!-- 遊戲牌桌會在這裡渲染 -->
        </main>
        
        <footer id="action-bar">
            <div class="action-buttons">
                <button id="btn-chow" class="action-btn" disabled>吃</button>
                <button id="btn-pong" class="action-btn" disabled>碰</button>
                <button id="btn-kong" class="action-btn" disabled>槓</button>
                <button id="btn-win" class="action-btn" disabled>胡</button>
            </div>
            <div class="game-info">
                <span id="tile-count">剩餘牌數: 0</span>
            </div>
        </footer>
    </div>
    
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <p id="modal-message"></p>
            <button id="modal-close">關閉</button>
        </div>
    </div>
    
    <script src="js/tiles.js"></script>
    <script src="js/player.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/scoring.js"></script>
    <script src="js/game.js"></script>
    <script>
        // 全域錯誤處理
        window.onerror = function(msg, url, line, col, error) {
            console.error('[全域錯誤]', {
                message: msg,
                url: url,
                line: line,
                column: col,
                error: error
            });
            alert('發生錯誤！請查看開發者工具主控台了解詳情。\n錯誤: ' + msg);
            return false;
        };

        // 未捕獲的 Promise 錯誤
        window.onunhandledrejection = function(event) {
            console.error('[未處理的 Promise 錯誤]', event.reason);
            alert('發生錯誤！請查看開發者工具主控台了解詳情。');
        };

        console.log('%c🀄 麻將網頁版 - 開發者模式已啟用', 'font-size: 16px; font-weight: bold; color: #0D7377;');
        console.log('%c錯誤會顯示在主控台，請注意 [麻將錯誤] 標籤', 'color: #666;');
    </script>
</body>
</html>
