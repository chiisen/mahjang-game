<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻將網頁版</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div id="app">
        <header>
            <h1>🀄 麻將網頁版</h1>
            <div class="header-controls">
                <button id="btn-settings">設定</button>
                <button id="btn-new-game">新局</button>
            </div>
        </header>

        <main id="game-board">
            <!-- 遊戲牌桌會在這裡渲染 -->
        </main>

        <footer id="action-bar">
            <div class="action-buttons">
                <button id="btn-chow" class="action-btn" disabled>吃</button>
                <button id="btn-pong" class="action-btn" disabled>碰</button>
                <button id="btn-kong" class="action-btn" disabled>槓</button>
                <button id="btn-win" class="action-btn" disabled>胡</button>
            </div>
            <div class="game-info">
                <span id="tile-count">剩餘牌數: 0</span>
            </div>
        </footer>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <div id="modal-message"></div>
            <button id="modal-close">關閉</button>
        </div>
    </div>

    <div id="loading-overlay" class="hidden">
        <div class="loading-spinner"></div>
        <div class="loading-text">電腦思考中...</div>
    </div>

    <!-- Templates -->
    <template id="tpl-player-area">
        <div class="player-area">
            <div class="player-name"></div>
            <div class="player-hand"></div>
            <div class="discard-pile"></div>
        </div>
    </template>

    <template id="tpl-tile">
        <div class="tile"></div>
    </template>

    <script src="js/init.js"></script>
    <script src="js/tiles.js"></script>
    <script src="js/player.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/scoring.js"></script>
    <script src="js/game.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
